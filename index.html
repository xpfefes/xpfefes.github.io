        class SurveyState {
            constructor() {
                this.state = this.loadState() || this.getInitialState();
                this.observers = new Set();
            }

            getInitialState() {
                return {
                    currentScreen: 'welcome',
                    currentQuestion: 0,
                    answers: {},
                    ageVerified: false,
                    sessionId: this.generateSessionId(),
                    startTime: Date.now(),
                    completed: false,
                    errorsCount: 0
                };
            }

            generateSessionId() {
                return `ERIK-${Date.now().toString(36)}-${Math.random().toString(36).substring(2, 8)}`.toUpperCase();
            }

            loadState() {
                try {
                    const s = localStorage.getItem(CONFIG.STORAGE_KEY);
                    return s ? (JSON.parse(s).currentScreen && JSON.parse(s).answers ? JSON.parse(s) : null) : null;
                } catch (e) {
                    return null;
                }
            }

            saveState() {
                try {
                    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.state));
                } catch (e) {
                    try {
                        sessionStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.state));
                    } catch (e2) {
                        // Fallback failed
                    }
                }
            }

            subscribe(fn) {
                this.observers.add(fn);
                return () => this.observers.delete(fn);
            }

            notify() {
                this.observers.forEach(fn => fn(this.state));
            }

            update(n) {
                this.state = { ...this.state, ...n };
                this.saveState();
                this.notify();
            }

            getState() {
                return { ...this.state };
            }

            reset() {
                this.state = this.getInitialState();
                this.saveState();
                this.notify();
            }

            incrementErrors() {
                this.update({ errorsCount: this.state.errorsCount + 1 });
            }
        }

            { id: 'q39', type: 'radio', text: 'Preferenza formato output codice?', options: ['Monospace', 'Syntax highlighting', 'Dark mode default', 'Light mode default'], required: true },
            
            // ATTENZIONE 9
            { id: 'att9', type: 'radio', text: 'Seleziona l\'ultima opzione della lista', options: ['Prima', 'Seconda', 'Terza', 'Ultima'], correctAnswer: 'Ultima', isAttentionCheck: true, required: true },
            
            { id: 'q40', type: 'radio', text: 'Come hai scoperto EriK?', options: ['Social', 'Amici', 'Forum/Reddit', 'Ricerca web'], required: true },
            
            // ATTENZIONE 10
            { id: 'att10', type: 'radio', text: 'Clicca su "Confermo di aver letto"', options: ['Non ho letto', 'Confermo di aver letto', 'Salta', 'Più tardi'], correctAnswer: 'Confermo di aver letto', isAttentionCheck: true, required: true }
        ];

        // VERIFICA CONTEGGIO
        if (QUESTIONS.length !== 45) {
            console.error(`QUESTION COUNT MISMATCH: ${QUESTIONS.length}/45`);
        }

        class PDFExporter {
            constructor() {
                /* PATCH #2: Lazy init - non crasha se jsPDF non ancora caricato */
                this.jsPDF = null;
            }

            /* PATCH #3: Verifica disponibilità libreria PRIMA di usarla */
            _ensureLib() {
                if (!window.jspdf || typeof window.jspdf.jsPDF !== 'function') {
                    throw new Error('Libreria PDF non disponibile. Verifica connessione e ricarica la pagina.');
                }
                if (!this.jsPDF) {
                    this.jsPDF = window.jspdf.jsPDF;
                }
                return true;
            }

            async generatePDF(state, questions) {
                this._ensureLib();
                
                const doc = new this.jsPDF();
                const margin = 20;
                let yPos = margin;

                // Titolo
                doc.setFontSize(20);
                /* PATCH #4: Font valido invece di undefined */
                doc.setFont('helvetica', 'bold');
                doc.text(CONFIG.PDF_TITLE, margin, yPos);
                yPos += 15;

                // Info sessione
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text(`Session ID: ${state.sessionId}`, margin, yPos);
                yPos += 6;
                doc.text(`Data: ${new Date().toLocaleString('it-IT')}`, margin, yPos);
                yPos += 6;
                doc.text(`Durata: ${Math.round((Date.now() - state.startTime) / 1000 / 60)} minuti`, margin, yPos);
                yPos += 15;

                // Linea separatore
                doc.setLineWidth(0.5);
                doc.line(margin, yPos, 190, yPos);
                yPos += 10;

                // Risposte
                doc.setFontSize(14);
                doc.setFont('helvetica', 'bold');
                doc.text('Risposte al Sondaggio', margin, yPos);
                yPos += 10;

                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');

                /* PATCH #5: Rimosso isLogicCheck (campo fantasma) */
                const validQuestions = questions.filter(q => !q.isAgeCheck && !q.isAttentionCheck);
                
                validQuestions.forEach((q, idx) => {
                    if (yPos > 270) {
                        doc.addPage();
                        yPos = margin;
                    }

                    const answer = state.answers[q.id];
                    if (answer === undefined || answer === null || answer === '') return;

                    // Domanda
                    doc.setFont('helvetica', 'bold');
                    doc.text(`${idx + 1}. ${q.text}`, margin, yPos, { maxWidth: 170 });
                    yPos += 6;

                    // Risposta
                    doc.setFont('helvetica', 'normal');
                    let answerText = String(answer);
                    if (q.type === 'slider') {
                        answerText = `${answer} su ${q.max}`;
                    }
                    doc.text(`Risposta: ${answerText}`, margin + 5, yPos, { maxWidth: 165 });
                    yPos += 10;
                });

                // Footer
                yPos = 280;
                doc.setFontSize(8);
                doc.setTextColor(128, 128, 128);
                doc.text('Generato automaticamente da EriK AI Survey System v3.0.0', margin, yPos);

                return doc;
            }

            async download(state, questions) {
                try {
                    this._ensureLib();
                    const doc = await this.generatePDF(state, questions);
                    const filename = `EriK_Survey_${state.sessionId}_${new Date().toISOString().split('T')[0]}.pdf`;
                    doc.save(filename);
                    return { success: true, filename };
                } catch (error) {
                    console.error('PDF generation failed:', error);
                    return { success: false, error: error.message || 'Errore sconosciuto' };
                }
            }
        }

        class SurveyRenderer {
            constructor(container, state) {
                this.container = container;
                this.state = state;
                this.pdfExporter = new PDFExporter();
            }

            render() {
                const s = this.state.getState();
                this.container.innerHTML = '';
                this.container.appendChild(this.getScreen(s));
                const f = this.container.querySelector('button, input, [tabindex]:not([tabindex="-1"])');
                if (f) setTimeout(() => f.focus(), 50);
            }

            getScreen(s) {
                if (s.currentScreen === 'welcome') return this.renderWelcome();
                if (s.currentScreen === 'question') return this.renderQuestion(s);
                if (s.currentScreen === 'summary') return this.renderSummary(s);
                if (s.currentScreen === 'completion') return this.renderCompletion(s);
                if (s.currentScreen === 'blocked') return this.renderBlocked();
                return this.renderWelcome();
            }

            renderWelcome() {
                const s = this.createElement('section', 'screen welcome-screen');
                s.setAttribute('aria-labelledby', 'welcome-title');
                s.innerHTML = `
                    <h1 id="welcome-title" class="welcome-title">EriK AI Closed Beta Survey ✦˚</h1>
                    <p class="welcome-subtitle">Accesso limitato per utenti 13-16 anni.<br>Le risposte aiutano il training e il miglioramento del sistema EriK MythOX™.</p>
                    <button class="btn btn-primary" id="start-btn" type="button">INIZIA TEST</button>
                    <p class="welcome-meta">45 domande • Tempo medio: 6-8 minuti</p>`;
                s.querySelector('#start-btn').addEventListener('click', () => this.state.update({ currentScreen: 'question', currentQuestion: 0 }));
                return s;
            }

            renderQuestion(state) {
                const q = QUESTIONS[state.currentQuestion];
                if (!q) {
                    this.state.update({ currentScreen: 'summary' });
                    return null;
                }

                const s = this.createElement('section', 'screen question-screen');
                const progress = Math.round(((state.currentQuestion + 1) / QUESTIONS.length) * 100);
                s.innerHTML = `
                    <header class="question-header">
                        <span class="question-number">${this.getLabel(q, state.currentQuestion)}</span>
                        <span class="progress-indicator">${progress}%</span>
                    </header>
                    <h2 class="question-text">${this.esc(q.text)}</h2>
                    <form id="q-form" novalidate>
                        ${this.renderInput(q, state.answers[q.id])}
                        <div class="btn-group">
                            ${state.currentQuestion > 0 ? '<button type="button" class="btn btn-secondary" id="prev-btn">Indietro</button>' : '<div></div>'}
                            <button type="submit" class="btn btn-primary" id="next-btn">${state.currentQuestion === QUESTIONS.length - 1 ? 'Riepilogo' : 'Avanti'}</button>
                        </div>
                    </form>`;
                this.attachHandlers(s, q, state);
                return s;
            }

            renderInput(q, val) {
                if (q.type === 'radio') {
                    return `<fieldset>
                        <legend class="sr-only">${this.esc(q.text)}</legend>
                        <ul class="options-list" role="radiogroup">
                            ${q.options.map((o, i) => `
                                <li class="option-item">
                                    <input type="radio" name="${q.id}" id="${q.id}_${i}" value="${this.esc(o)}" class="option-input" ${val === o ? 'checked' : ''} required>
                                    <label for="${q.id}_${i}" class="option-label">${this.esc(o)}</label>
                                </li>
                            `).join('')}
                        </ul>
                    </fieldset>`;
                }

                const v = val || q.default;
                return `<div class="slider-container">
                    <input type="range" id="${q.id}" name="${q.id}" min="${q.min}" max="${q.max}" value="${v}" class="slider-input" aria-valuemin="${q.min}" aria-valuemax="${q.max}" aria-valuenow="${v}" required>
                    <div class="slider-value" id="${q.id}_val">${v}</div>
                    <div class="slider-labels">
                        <span>${q.min}</span>
                        <span>${q.max}</span>
                    </div>
                </div>`;
            }

            attachHandlers(scr, q, st) {
                const form = scr.querySelector('#q-form');
                const next = scr.querySelector('#next-btn');
                const prev = scr.querySelector('#prev-btn');

                if (q.type === 'slider') {
                    const sl = scr.querySelector(`#${q.id}`);
                    const vl = scr.querySelector(`#${q.id}_val`);
                    sl.addEventListener('input', e => {
                        vl.textContent = e.target.value;
                        sl.setAttribute('aria-valuenow', e.target.value);
                    });
                }

                form.addEventListener('submit', e => {
                    e.preventDefault();
                    const ans = new FormData(form).get(q.id);

                    if (!ans && q.required) {
                        this.showError('Seleziona una risposta per continuare');
                        return;
                    }

                    if (q.isAgeCheck && ans !== CONFIG.TARGET_AGE_GROUP) {
                        this.blockAndRedirect('age_rejected');
                        return;
                    }

                    if (q.isAttentionCheck && ans !== q.correctAnswer) {
                        this.state.incrementErrors();
                        this.blockAndRedirect('attention_failed');
                        return;
                    }

                    const newAns = { ...st.answers, [q.id]: ans };
                    const nextQ = st.currentQuestion + 1;

                    if (nextQ >= QUESTIONS.length) {
                        this.state.update({ answers: newAns, currentScreen: 'summary' });
                    } else {
                        this.state.update({ answers: newAns, currentQuestion: nextQ });
                    }
                });

                if (prev) {
                    prev.addEventListener('click', () => this.state.update({ currentQuestion: st.currentQuestion - 1 }));
                }
            }

            renderSummary(st) {
                const s = this.createElement('section', 'screen summary-screen');
                s.setAttribute('aria-labelledby', 'summary-title');

                /* PATCH #5b: Rimosso isLogicCheck reference fantasma */
                const html = QUESTIONS.filter(q => !q.isAgeCheck && !q.isAttentionCheck)
                    .map(q => {
                        const a = st.answers[q.id];
                        if (a === undefined || a === null || a === '') return '';

                        if (q.type === 'slider') {
                            return `<div class="summary-item" role="listitem">
                                <div class="summary-item-question">${this.esc(q.text)}</div>
                                <div class="summary-item-answer slider-answer">
                                    <span class="slider-badge">${a}</span>
                                    <span>su ${q.max}</span>
                                </div>
                            </div>`;
                        }

                        return `<div class="summary-item" role="listitem">
                            <div class="summary-item-question">${this.esc(q.text)}</div>
                            <div class="summary-item-answer">${this.esc(String(a))}</div>
                        </div>`;
                    }).join('');

                s.innerHTML = `
                    <h1 id="summary-title" class="summary-title">Riepilogo Risposte ✦˚</h1>
                    <p class="summary-subtitle">Verifica le tue risposte prima di completare</p>
                    <div class="summary-list" role="list">${html}</div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-secondary" id="edit-btn">Modifica</button>
                        <button type="button" class="btn btn-primary" id="confirm-btn">Conferma e Scarica PDF</button>
                    </div>`;

                s.querySelector('#edit-btn').addEventListener('click', () => this.state.update({ currentScreen: 'question', currentQuestion: 0 }));
                s.querySelector('#confirm-btn').addEventListener('click', async () => {
                    const result = await this.pdfExporter.download(st, QUESTIONS);
                    if (result.success) {
                        this.state.update({ currentScreen: 'completion', pdfDownloaded: true });
                    } else {
                        this.showError('Errore generazione PDF: ' + result.error);
                    }
                });

                return s;
            }

            renderBlocked() {
                const s = this.createElement('section', 'screen blocked-screen');
                s.setAttribute('role', 'alert');
                s.innerHTML = `
                    <div class="blocked-icon">🚫</div>
                    <h1 class="error-title">Accesso Bloccato</h1>
                    <p class="quality-low">⚠️ QUALITÀ CANDIDATO: BASSA ⚠️</p>
                    <p class="error-message">
                        Il tuo profilo non soddisfa i requisiti del test o la verifica di attenzione è fallita.<br><br>
                        Non è possibile ripetere il sondaggio.<br>
                        Contatta il team EriK MythOX™ per informazioni.
                    </p>
                    <p style="color: var(--color-text-muted); font-size: var(--font-size-sm); margin-top: 2rem;">
                        Sessione terminata permanentemente.
                    </p>`;
                return s;
            }

            renderCompletion(st) {
                const s = this.createElement('section', 'screen completion-screen');
                s.innerHTML = `
                    <h1 class="completion-title">TEST COMPLETATO ✦˚</h1>
                    <p class="completion-message">Le tue risposte sono state registrate correttamente nel sistema EriK MythOX™.</p>
                    
                    <div class="download-section">
                        <h3>📄 PDF Scaricato</h3>
                        <p style="color: var(--color-text-secondary); margin: var(--space-4) 0;">
                            Il tuo report è stato generato e scaricato con successo.
                        </p>
                        <button class="btn btn-primary" id="download-again-btn" type="button">SCARICA NUOVAMENTE PDF</button>
                    </div>
                    
                    <div class="completion-instructions">
                        <p>📸 Ora invia il PDF scaricato nel gruppo di colocazione per ricevere la ricompensa beta.</p>
                    </div>
                    
                    <button class="btn btn-primary" id="finish-btn" type="button">TERMINA</button>
                    <p class="session-id">Session ID: ${st.sessionId}</p>`;

                s.querySelector('#download-again-btn').addEventListener('click', async () => {
                    const result = await this.pdfExporter.download(st, QUESTIONS);
                    if (!result.success) {
                        this.showError('Errore download PDF: ' + result.error);
                    }
                });

                s.querySelector('#finish-btn').addEventListener('click', () => {
                    try {
                        localStorage.removeItem(CONFIG.STORAGE_KEY);
                    } catch (e) { /* ignore */ }
                    this.state.update({ currentScreen: 'welcome' });
                });

                return s;
            }

            blockAndRedirect(reason) {
                try {
                    localStorage.setItem(CONFIG.BLOCK_KEY, JSON.stringify({ reason, timestamp: Date.now() }));
                } catch (e) { /* localStorage disabilitato */ }
                this.state.update({ currentScreen: 'blocked' });
            }

            export(st) {
                const data = {
                    sessionId: st.sessionId,
                    timestamp: new Date().toISOString(),
                    duration: Date.now() - st.startTime,
                    answers: st.answers,
                    version: CONFIG.VERSION,
                    errorsCount: st.errorsCount
                };

                if (CONFIG.DEBUG) {
                    console.log('Survey Data:', data);
                }

                try {
                    const arr = JSON.parse(localStorage.getItem(CONFIG.RESULTS_KEY) || '[]');
                    arr.push(data);
                    localStorage.setItem(CONFIG.RESULTS_KEY, JSON.stringify(arr));
                } catch (e) {
                    console.error('Export failed', e);
                }
            }

            getLabel(q, i) {
                if (q.isAgeCheck) return 'Verifica Età';
                /* PATCH #5c: Rimosso isLogicCheck */
                const valid = QUESTIONS.filter(x => !x.isAgeCheck && !x.isAttentionCheck);
                const idx = valid.findIndex(x => x.id === q.id);
                return idx >= 0 ? `Domanda ${idx + 1} di ${valid.length}` : `${i + 1}`;
            }

            createElement(t, c) {
                const e = document.createElement(t);
                if (c) e.className = c;
                return e;
            }

            esc(t) {
                const d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }

            showError(m) {
                const e = document.createElement('div');
                e.setAttribute('role', 'alert');
                e.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--color-danger); color: white; padding: 1rem 2rem; border-radius: 0.5rem; z-index: 10000; animation: fadeIn 0.3s ease-out;`;
                e.textContent = m;
                document.body.appendChild(e);
                setTimeout(() => {
                    e.style.animation = 'fadeIn 0.3s ease-out reverse';
                    setTimeout(() => e.remove(), 300);
                }, 3000);
            }
        }

        class SurveyApp {
            constructor() {
                this.container = document.getElementById('survey-container');
                if (!this.container) throw new Error('Container missing');

                this.state = new SurveyState();
                this.renderer = new SurveyRenderer(this.container, this.state);
                this.init();
            }

            init() {
                // CHECK PERMANENT BLOCK
                try {
                    const blockedStr = localStorage.getItem(CONFIG.BLOCK_KEY);
                    if (blockedStr) {
                        const blocked = JSON.parse(blockedStr);
                        if (blocked && blocked.timestamp) {
                            this.state.update({ currentScreen: 'blocked' });
                            this.renderer.render();
                            return;
                        }
                    }
                } catch (e) {
                    // Block check failed - continua normalmente
                }

                this.state.subscribe(() => this.renderer.render());
                this.renderer.render();

                // Prevenzione chiusura accidentale
                window.addEventListener('beforeunload', (e) => {
                    const state = this.state.getState();
                    if (state.currentScreen === 'question' && !state.completed) {
                        e.preventDefault();
                        e.returnValue = 'Sei sicuro di voler abbandonare il sondaggio? I progressi andranno persi.';
                        return e.returnValue;
                    }
                });

                // Prevenzione navigazione indietro
                window.addEventListener('popstate', () => history.pushState(null, '', location.href));
                history.pushState(null, '', location.href);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.surveyApp = new SurveyApp();
            } catch (e) {
                document.getElementById('survey-container').innerHTML = `
                    <section class="screen error-screen" role="alert">
                        <h1 class="error-title">Errore</h1>
                        <p class="error-message">Errore caricamento. Ricarica.</p>
                        <button class="btn btn-primary" onclick="location.reload()">Ricarica</button>
                    </section>`;
            }
        });

        document.addEventListener('submit', e => {
            if (!e.target.id || e.target.id !== 'q-form') e.preventDefault();
        });
    </script>
</body>
</html>
