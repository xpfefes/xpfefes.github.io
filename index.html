  <style>
    :root{
      --color-primary:#6366f1;
      --color-primary-dark:#4f46e5;
      --color-secondary:#8b5cf6;
      --color-success:#10b981;
      --color-danger:#ef4444;
      --color-warning:#f59e0b;
      --color-background:#0f172a;
      --color-surface:#1e293b;
      --color-surface-elevated:#334155;
      --color-text-primary:#f1f5f9;
      --color-text-secondary:#cbd5e1;
      --color-text-muted:#94a3b8;
      --color-border:#475569;
      --font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      --font-size-xs:0.75rem;
      --font-size-sm:0.875rem;
      --font-size-base:1rem;
      --font-size-lg:1.125rem;
      --font-size-xl:1.25rem;
      --font-size-2xl:1.5rem;
      --font-size-3xl:1.875rem;
      --font-size-4xl:2.25rem;
      --space-1:0.25rem;
      --space-2:0.5rem;
      --space-3:0.75rem;
      --space-4:1rem;
      --space-6:1.5rem;
      --space-8:2rem;
      --space-12:3rem;
      --radius-sm:0.375rem;
      --radius-md:0.5rem;
      --radius-lg:0.75rem;
      --radius-xl:1rem;
      --shadow-sm:0 1px 2px 0 rgba(0,0,0,.05);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,.1);
      --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1);
      --shadow-glow:0 0 20px rgba(99,102,241,.3);
      --transition-fast:150ms cubic-bezier(.4,0,.2,1);
      --transition-base:250ms cubic-bezier(.4,0,.2,1);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{
      font-family:var(--font-family);
      font-size:var(--font-size-base);
      line-height:1.6;
      color:var(--color-text-primary);
      background:linear-gradient(135deg,var(--color-background) 0%,#1a1f3a 100%);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    body.locked {
      overflow: hidden;
      pointer-events: none;
    }

    .no-js-warning{
      position:fixed;inset:0;background:var(--color-danger);color:white;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:var(--space-8);text-align:center;z-index:9999;
    }

    .survey-container{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:var(--space-4);max-width:860px;width:100%;margin:0 auto;
    }

    .screen{
      width:100%;
      background:var(--color-surface);
      border-radius:var(--radius-xl);
      padding:var(--space-12);
      box-shadow:var(--shadow-lg);
      animation:fadeIn var(--transition-base) ease-out;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }

    .welcome-screen{text-align:center}
    .welcome-title{
      font-size:var(--font-size-4xl);
      font-weight:700;
      background:linear-gradient(135deg,var(--color-primary) 0%,var(--color-secondary) 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:var(--space-6);
    }
    .welcome-subtitle{
      font-size:var(--font-size-lg);
      color:var(--color-text-secondary);
      margin-bottom:var(--space-8);
      line-height:1.8;
    }
    .welcome-meta{font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:var(--space-4)}

    .question-screen{display:flex;flex-direction:column;gap:var(--space-8)}
    .question-header{
      display:flex;justify-content:space-between;align-items:center;
      padding-bottom:var(--space-4);border-bottom:2px solid var(--color-border)
    }
    .question-number{font-size:var(--font-size-sm);color:var(--color-text-muted);font-weight:600}
    .progress-indicator{font-size:var(--font-size-sm);color:var(--color-primary);font-weight:600}
    .question-text{font-size:var(--font-size-2xl);font-weight:600;color:var(--color-text-primary);line-height:1.4}

    .options-list{display:flex;flex-direction:column;gap:var(--space-3);list-style:none}
    .option-item{position:relative}
    .option-input{position:absolute;opacity:0;pointer-events:none}
    .option-label{
      display:block;padding:var(--space-4) var(--space-6);background:var(--color-surface-elevated);
      border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;
      transition:all var(--transition-fast);font-size:var(--font-size-base);color:var(--color-text-primary);user-select:none
    }
    .option-label:hover{border-color:var(--color-primary);transform:translateX(4px)}
    .option-input:focus + .option-label{outline:3px solid var(--color-primary);outline-offset:2px}
    .option-input:checked + .option-label{background:var(--color-primary);border-color:var(--color-primary);color:white;font-weight:600}

    .slider-container{display:flex;flex-direction:column;gap:var(--space-4)}
    .slider-input{
      width:100%;height:8px;border-radius:var(--radius-sm);background:var(--color-surface-elevated);
      outline:none;-webkit-appearance:none;appearance:none;cursor:pointer
    }
    .slider-input::-webkit-slider-thumb{
      -webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--color-primary);
      cursor:pointer;transition:all var(--transition-fast);box-shadow:var(--shadow-glow)
    }
    .slider-input::-webkit-slider-thumb:hover{transform:scale(1.2)}
    .slider-input::-moz-range-thumb{
      width:24px;height:24px;border-radius:50%;background:var(--color-primary);
      cursor:pointer;border:none;box-shadow:var(--shadow-glow)

    .slider-value{text-align:center;font-size:var(--font-size-3xl);font-weight:700;color:var(--color-primary)}
    .slider-labels{display:flex;justify-content:space-between;font-size:var(--font-size-sm);color:var(--color-text-muted)}

    .btn{

      padding:var(--space-4) var(--space-8);font-size:var(--font-size-lg);font-weight:600;
      border:none;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition-fast);user-select:none
    }
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{
      background:linear-gradient(135deg,var(--color-primary) 0%,var(--color-secondary) 100%);
      color:white;box-shadow:var(--shadow-md)
    }
    .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--shadow-lg),var(--shadow-glow)}
    .btn-secondary{background:var(--color-surface-elevated);color:var(--color-text-primary);border:2px solid var(--color-border)}
    .btn-secondary:hover:not(:disabled){background:var(--color-border)}
    .btn-danger{background:var(--color-danger);color:white}
    .btn-group{display:flex;gap:var(--space-4);justify-content:space-between;margin-top:var(--space-8)}

    .error-screen,.blocked-screen{
      text-align:center;
      border:3px solid var(--color-danger);
    }
    .error-title{font-size:var(--font-size-3xl);color:var(--color-danger);margin-bottom:var(--space-6)}
    .error-message{font-size:var(--font-size-lg);color:var(--color-text-secondary);margin-bottom:var(--space-8);line-height:1.8}
    .blocked-icon{font-size:4rem;margin-bottom:var(--space-6)}

    .summary-screen{display:flex;flex-direction:column;gap:var(--space-6)}
    .summary-title{
      font-size:var(--font-size-3xl);font-weight:700;
      background:linear-gradient(135deg,var(--color-primary) 0%,var(--color-secondary) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-align:center;margin-bottom:var(--space-4)
    }
    .summary-subtitle{text-align:center;color:var(--color-text-secondary);font-size:var(--font-size-lg);margin-bottom:var(--space-6)}
    .summary-list{
      display:flex;flex-direction:column;gap:var(--space-4);max-height:450px;
      overflow-y:auto;padding-right:var(--space-2)
    }
    .summary-item{background:var(--color-surface-elevated);padding:var(--space-4);border-radius:var(--radius-md);border-left:4px solid var(--color-primary)}
    .summary-item-question{font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-2);font-weight:600}
    .summary-item-answer{font-size:var(--font-size-base);color:var(--color-text-primary);font-weight:500}
    .summary-item.slider-answer{display:flex;align-items:center;gap:var(--space-3)}
    .summary-item.slider-answer .slider-badge{background:var(--color-primary);color:white;padding:var(--space-1) var(--space-3);border-radius:var(--radius-sm);font-weight:700}

    .completion-screen{text-align:center}
    .completion-title{
      font-size:var(--font-size-4xl);font-weight:700;
      background:linear-gradient(135deg,var(--color-success) 0%,var(--color-primary) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:var(--space-8)
    }
    .completion-message{font-size:var(--font-size-lg);color:var(--color-text-secondary);margin-bottom:var(--space-8);line-height:1.8}
    .completion-instructions{
      background:var(--color-surface-elevated);padding:var(--space-6);border-radius:var(--radius-lg);
      margin-bottom:var(--space-8);border-left:4px solid var(--color-primary);text-align:left
    }
    .session-id{font-size:var(--font-size-sm);color:var(--color-text-muted);margin-top:var(--space-4);font-family:"Courier New",monospace}

    .survey-footer{text-align:center;padding:var(--space-4);color:var(--color-text-muted);font-size:var(--font-size-xs)}
    .summary-list::-webkit-scrollbar{width:8px}
    .summary-list::-webkit-scrollbar-track{background:var(--color-surface);border-radius:var(--radius-sm)}
    .summary-list::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:var(--radius-sm)}
    .summary-list::-webkit-scrollbar-thumb:hover{background:var(--color-primary)}

    .sr-only{
      position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0
    }
    *:focus-visible{outline:3px solid var(--color-primary);outline-offset:2px}

    @media (max-width:640px){
      .screen{padding:var(--space-6)}
      .welcome-title,.completion-title,.summary-title{font-size:var(--font-size-3xl)}
      .question-text{font-size:var(--font-size-xl)}
      .btn-group{flex-direction:column-reverse}
      .btn{width:100%}
      .summary-list{max-height:300px}
    }
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
    }
  </style>

  <script>
    'use strict';

    const CONFIG = {
      STORAGE_KEY: 'erik_survey_state_v3',
      RESULTS_KEY: 'erik_survey_results_v3',
      BLOCK_KEY: 'erik_survey_blocked_v3',
      TARGET_AGE_GROUP: '13-16',
      VERSION: '3.0.0',
      BLOCK_CLOSE_DELAY: 1400
    };

    class SurveyState {
      constructor() {
        this.state = this.loadState() || this.getInitialState();
        this.observers = new Set();
      }
      getInitialState() {
        return {
          currentScreen: 'welcome',
          currentQuestion: 0,
          answers: {},
          sessionId: this.generateSessionId(),
          startTime: Date.now(),
          completed: false
        };
      }
      generateSessionId() {
        return `ERIK-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`.toUpperCase();
      }
      loadState() {
        try {
          const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          return parsed && parsed.currentScreen ? parsed : null;
        } catch {
          return null;
        }
      }
      saveState() {
        try {
          localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.state));
        } catch {
          try {
            sessionStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(this.state));
          } catch {}
        }
      }
      subscribe(fn) {
        this.observers.add(fn);
        return () => this.observers.delete(fn);
      }
      notify() {
        this.observers.forEach(fn => fn(this.state));
      }
      update(next) {
        this.state = { ...this.state, ...next };
        this.saveState();
        this.notify();
      }
      getState() {
        return { ...this.state, answers: { ...this.state.answers } };
      }
      reset() {
        this.state = this.getInitialState();
        this.saveState();
        this.notify();
      }
    }

    const QUESTIONS = [

      {id:'q37',type:'radio',text:'Quale feature manca di più?',options:['Ricerca interna','Cronologia cloud','API pubbliche','Template pronti'],required:true},
      {id:'att3',type:'radio',text:'Conferma la selezione corretta',options:['Nebula Core','Ologramma beta','Pixel sferico','Turbina quantica'],correctAnswer:'Nebula Core',isAttentionCheck:true,required:true},
      {id:'q38',type:'slider',text:'Importanza della compatibilità mobile',min:1,max:10,default:5,required:true},
      {id:'q39',type:'radio',text:'Preferenza formato output codice?',options:['Monospace','Syntax highlighting','Dark mode default','Light mode default'],required:true},

    const REAL_QUESTIONS = QUESTIONS.filter(q => !q.isAgeCheck && !q.isAttentionCheck && !q.isLogicCheck);
    const CHECKS = QUESTIONS.filter(q => q.isAgeCheck || q.isAttentionCheck || q.isLogicCheck);

    class SurveyRenderer {
      constructor(container, state) {
        this.container = container;
        this.state = state;
        this.pdfReady = false;
      }

      render() {
        const s = this.state.getState();
        this.container.innerHTML = '';
        const screen = this.getScreen(s);
        if (screen) this.container.appendChild(screen);
        const focusTarget = this.container.querySelector('button, input, [tabindex]:not([tabindex="-1"])');
        if (focusTarget) setTimeout(() => focusTarget.focus(), 50);
      }

      getScreen(s) {
        if (s.currentScreen === 'welcome') return this.renderWelcome();
        if (s.currentScreen === 'question') return this.renderQuestion(s);
        if (s.currentScreen === 'summary') return this.renderSummary(s);
        if (s.currentScreen === 'completion') return this.renderCompletion(s);
        if (s.currentScreen === 'blocked') return this.renderBlocked();
        return this.renderWelcome();
      }

      renderWelcome() {
        const el = this.createElement('section', 'screen welcome-screen');
        el.setAttribute('aria-labelledby', 'welcome-title');
        el.innerHTML = `
          <h1 id="welcome-title" class="welcome-title">EriK AI Closed Beta Survey ✦˚</h1>
          <p class="welcome-subtitle">Accesso limitato per utenti 13-16 anni.<br>Le risposte aiutano il training e il miglioramento del sistema EriK MythOX™.</p>
          <button class="btn btn-primary" id="start-btn" type="button">INIZIA TEST</button>
          <p class="welcome-meta">${REAL_QUESTIONS.length} domande • Tempo medio: 6-8 minuti</p>
        `;
        el.querySelector('#start-btn').addEventListener('click', () => this.state.update({ currentScreen: 'question', currentQuestion: 0 }));
        return el;
      }

      renderQuestion(state) {
        const q = QUESTIONS[state.currentQuestion];
        if (!q) {
          this.state.update({ currentScreen: 'summary' });
          return null;
        }

        const el = this.createElement('section', 'screen question-screen');
        const progress = Math.round(((state.currentQuestion + 1) / QUESTIONS.length) * 100);
        el.innerHTML = `
          <header class="question-header">
            <span class="question-number">${this.getLabel(q, state.currentQuestion)}</span>
            <span class="progress-indicator">${progress}%</span>
          </header>
          <h2 class="question-text">${this.esc(q.text)}</h2>
          <form id="q-form" novalidate>
            ${this.renderInput(q, state.answers[q.id])}
            <div class="btn-group">
              ${state.currentQuestion > 0 ? '<button type="button" class="btn btn-secondary" id="prev-btn">Indietro</button>' : '<div></div>'}
              <button type="submit" class="btn btn-primary" id="next-btn">${state.currentQuestion === QUESTIONS.length - 1 ? 'Riepilogo' : 'Avanti'}</button>
            </div>
          </form>
        `;
        this.attachHandlers(el, q, state);
        return el;
      }

      renderInput(q, val) {
        if (q.type === 'radio') {
          return `
            <fieldset>
              <legend class="sr-only">${this.esc(q.text)}</legend>
              <ul class="options-list" role="radiogroup">
                ${q.options.map((o, i) => `
                  <li class="option-item">
                    <input type="radio" name="${q.id}" id="${q.id}_${i}" value="${this.esc(o)}" class="option-input" ${val === o ? 'checked' : ''} required>
                    <label for="${q.id}_${i}" class="option-label">${this.esc(o)}</label>
                  </li>
                `).join('')}
              </ul>
            </fieldset>
          `;
        }
        const v = val || q.default;
        return `
          <div class="slider-container">
            <input type="range" id="${q.id}" name="${q.id}" min="${q.min}" max="${q.max}" value="${v}" class="slider-input" aria-valuemin="${q.min}" aria-valuemax="${q.max}" aria-valuenow="${v}" required>
            <div class="slider-value" id="${q.id}_val">${v}</div>
            <div class="slider-labels"><span>${q.min}</span><span>${q.max}</span></div>
          </div>
        `;
      }

      attachHandlers(scr, q, st) {
        const form = scr.querySelector('#q-form');
        const prev = scr.querySelector('#prev-btn');

        if (q.type === 'slider') {
          const sl = scr.querySelector(`#${q.id}`);
          const vl = scr.querySelector(`#${q.id}_val`);
          sl.addEventListener('input', e => {
            vl.textContent = e.target.value;
            sl.setAttribute('aria-valuenow', e.target.value);
          });
        }

        form.addEventListener('submit', e => {
          e.preventDefault();

          const formData = new FormData(form);
          const ans = formData.get(q.id);

          if (!ans && q.required) {
            this.showError('Seleziona una risposta per continuare');
            return;
          }

          if (q.isAgeCheck && ans !== CONFIG.TARGET_AGE_GROUP) {
            this.blockAndRedirect('age_rejected', 'Qualità bassa: età non compatibile con il test.');
            return;
          }

          if (q.isAttentionCheck && ans !== q.correctAnswer) {
            this.blockAndRedirect('attention_failed', 'Qualità bassa: attenzione non sufficiente.');
            return;
          }

          if (q.isLogicCheck && ans !== q.correctAnswer) {
            this.blockAndRedirect('logic_failed', 'Qualità bassa: verifica logica non superata.');
            return;
          }

          const newAnswers = { ...st.answers, [q.id]: ans };
          const nextQ = st.currentQuestion + 1;
          this.state.update(
            nextQ >= QUESTIONS.length
              ? { answers: newAnswers, currentScreen: 'summary' }
              : { answers: newAnswers, currentQuestion: nextQ }
          );
        });

        if (prev) {
          prev.addEventListener('click', () => {
            this.state.update({ currentQuestion: Math.max(0, st.currentQuestion - 1) });
          });
        }
      }

      renderSummary(st) {
        const el = this.createElement('section', 'screen summary-screen');
        el.setAttribute('aria-labelledby', 'summary-title');

        const items = REAL_QUESTIONS.map(q => {
          const a = st.answers[q.id];
          if (a === undefined || a === null || a === '') return '';
          if (q.type === 'slider') {
            return `
              <div class="summary-item" role="listitem">
                <div class="summary-item-question">${this.esc(q.text)}</div>
                <div class="summary-item-answer slider-answer"><span class="slider-badge">${this.esc(String(a))}</span><span>su ${q.max}</span></div>
              </div>
            `;
          }
          return `
            <div class="summary-item" role="listitem">
              <div class="summary-item-question">${this.esc(q.text)}</div>
              <div class="summary-item-answer">${this.esc(String(a))}</div>
            </div>
          `;
        }).join('');

        el.innerHTML = `
          <h1 id="summary-title" class="summary-title">Riepilogo Risposte ✦˚</h1>
          <p class="summary-subtitle">Verifica le tue risposte prima di completare</p>
          <div class="summary-list" role="list">${items}</div>
          <div class="btn-group">
            <button type="button" class="btn btn-secondary" id="edit-btn">Modifica</button>
            <button type="button" class="btn btn-primary" id="confirm-btn">Conferma e Completa</button>
          </div>
        `;

        el.querySelector('#edit-btn').addEventListener('click', () => this.state.update({ currentScreen: 'question', currentQuestion: 0 }));
        el.querySelector('#confirm-btn').addEventListener('click', () => {
          this.export(st);
          this.state.update({ currentScreen: 'completion' });
        });

        return el;
      }

      renderBlocked() {
        const el = this.createElement('section', 'screen blocked-screen');
        el.setAttribute('role', 'alert');
        el.innerHTML = `
          <div class="blocked-icon">🚫</div>
          <h1 class="error-title">Accesso Bloccato</h1>
          <p class="error-message">
            Il profilo non soddisfa i requisiti del test oppure una verifica è fallita.<br><br>
            La sessione è stata chiusa e non può continuare.
          </p>
          <p style="color:var(--color-text-muted);font-size:var(--font-size-sm);margin-top:1.5rem;">Schermata qualità bassa attiva.</p>
          <div class="btn-group" style="justify-content:center;margin-top:2rem;">
            <button type="button" class="btn btn-danger" id="close-btn">Chiudi</button>
          </div>
        `;

        el.querySelector('#close-btn').addEventListener('click', () => {
          this.tryCloseTab();
        });

        return el;
      }

      renderCompletion(st) {
        const el = this.createElement('section', 'screen completion-screen');
        el.innerHTML = `
          <h1 class="completion-title">TEST COMPLETATO ✦˚</h1>
          <p class="completion-message">Le tue risposte sono state registrate correttamente nel sistema EriK MythOX™.</p>
          <div class="completion-instructions">
            <p>📄 Ora puoi scaricare il PDF con tutte le risposte e inviarlo dove ti serve.</p>
          </div>
          <div class="btn-group" style="justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-primary" id="pdf-btn" type="button">Scarica PDF risposte</button>
            <button class="btn btn-secondary" id="finish-btn" type="button">Torna all'inizio</button>
          </div>
          <p class="session-id">Session ID: ${this.esc(st.sessionId)}</p>
        `;

        el.querySelector('#pdf-btn').addEventListener('click', () => this.exportPdf(st));
        el.querySelector('#finish-btn').addEventListener('click', () => {
          localStorage.removeItem(CONFIG.STORAGE_KEY);
          this.state.reset();
        });

        return el;
      }

      blockAndRedirect(reason, message) {
        try {
          localStorage.setItem(CONFIG.BLOCK_KEY, JSON.stringify({
            reason,
            message,
            timestamp: Date.now()
          }));
        } catch {}
        this.state.update({ currentScreen: 'blocked' });
        document.body.classList.add('locked');

        setTimeout(() => {
          this.tryCloseTab();
        }, CONFIG.BLOCK_CLOSE_DELAY);
      }

      tryCloseTab() {
        try {
          window.open('', '_self');
          window.close();
        } catch {}
        setTimeout(() => {
          try {
            location.replace('about:blank');
          } catch {}
        }, 250);
      }

      export(st) {
        const data = {
          sessionId: st.sessionId,
          timestamp: new Date().toISOString(),
          durationMs: Date.now() - st.startTime,
          answers: st.answers,
          version: CONFIG.VERSION
        };

        try {
          const arr = JSON.parse(localStorage.getItem(CONFIG.RESULTS_KEY) || '[]');
          arr.push(data);
          localStorage.setItem(CONFIG.RESULTS_KEY, JSON.stringify(arr));
        } catch (e) {
          console.error('Export failed', e);
        }

        this.lastExport = data;
      }

      exportPdf(st) {
        const payload = {
          sessionId: st.sessionId,
          timestamp: new Date().toISOString(),
          durationMs: Date.now() - st.startTime,
          answers: st.answers
        };

        const entries = [];
        for (const q of REAL_QUESTIONS) {
          const ans = payload.answers[q.id];
          if (ans !== undefined && ans !== null && String(ans).trim() !== '') {
            entries.push([q.text, String(ans)]);
          }
        }

        const jsPDF = window.jspdf && window.jspdf.jsPDF;
        if (!jsPDF) {
          this.showError('PDF non disponibile: la libreria non è caricata.');
          return;
        }

        const doc = new jsPDF({ unit: 'pt', format: 'a4' });
        const pageWidth = doc.internal.pageSize.getWidth();
        const margin = 40;
        let y = 48;

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.text('EriK AI Survey - Risposte', margin, y);

        y += 24;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(10);
        doc.text(`Session ID: ${payload.sessionId}`, margin, y);
        y += 14;
        doc.text(`Data: ${payload.timestamp}`, margin, y);
        y += 14;
        doc.text(`Durata: ${Math.round(payload.durationMs / 1000)} secondi`, margin, y);
        y += 22;

        doc.setFontSize(11);
        for (const [question, answer] of entries) {
          const qLines = doc.splitTextToSize(`Q: ${question}`, pageWidth - margin * 2);
          const aLines = doc.splitTextToSize(`A: ${answer}`, pageWidth - margin * 2);
          const blockHeight = (qLines.length + aLines.length) * 14 + 12;

          if (y + blockHeight > 800) {
            doc.addPage();
            y = 48;
          }

          doc.setFont('helvetica', 'bold');
          doc.text(qLines, margin, y);
          y += qLines.length * 14 + 4;

          doc.setFont('helvetica', 'normal');
          doc.text(aLines, margin, y);
          y += aLines.length * 14 + 12;

          doc.setDrawColor(200);
          doc.line(margin, y - 8, pageWidth - margin, y - 8);
        }

        const safeFile = `erik_risposte_${payload.sessionId}.pdf`;
        doc.save(safeFile);
      }

      getLabel(q, index) {
        if (q.isAgeCheck) return 'Verifica Età';
        const validIndex = REAL_QUESTIONS.findIndex(x => x.id === q.id);
        return validIndex >= 0 ? `Domanda ${validIndex + 1} di ${REAL_QUESTIONS.length}` : `${index + 1}`;
      }

      createElement(tag, className) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        return el;
      }

      esc(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      showError(message) {
        const el = document.createElement('div');
        el.setAttribute('role', 'alert');
        el.style.cssText = `
          position:fixed;top:20px;left:50%;transform:translateX(-50%);
          background:var(--color-danger);color:white;padding:1rem 2rem;
          border-radius:0.5rem;z-index:10000;animation:fadeIn 0.3s ease-out;
          box-shadow:0 10px 25px rgba(0,0,0,.25);max-width:min(92vw, 560px);text-align:center;
        `;
        el.textContent = message;
        document.body.appendChild(el);
        setTimeout(() => {
          el.style.animation = 'fadeIn 0.3s ease-out reverse';
          setTimeout(() => el.remove(), 300);
        }, 2500);
      }
    }

    class SurveyApp {
      constructor() {
        this.container = document.getElementById('survey-container');
        if (!this.container) throw new Error('Container missing');
        this.state = new SurveyState();
        this.renderer = new SurveyRenderer(this.container, this.state);
        this.init();
      }

      init() {
        try {
          const blocked = JSON.parse(localStorage.getItem(CONFIG.BLOCK_KEY));
          if (blocked && blocked.timestamp) {
            this.state.update({ currentScreen: 'blocked' });
            document.body.classList.add('locked');
            this.renderer.render();
            return;
          }
        } catch {}

        this.state.subscribe(() => this.renderer.render());
        this.renderer.render();

        window.addEventListener('popstate', () => {
          history.pushState(null, '', location.href);
        });
        history.pushState(null, '', location.href);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      try {
        window.surveyApp = new SurveyApp();
      } catch (e) {
        document.getElementById('survey-container').innerHTML = `
          <section class="screen error-screen" role="alert">
            <h1 class="error-title">Errore</h1>
            <p class="error-message">Errore caricamento. Ricarica la pagina.</p>
            <button class="btn btn-primary" onclick="location.reload()">Ricarica</button>
          </section>
        `;
      }
    });

    document.addEventListener('submit', e => {
      if (!e.target.id || e.target.id !== 'q-form') e.preventDefault();
    });
  </script>
</body>
</html>
