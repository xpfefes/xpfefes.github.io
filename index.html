<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGPT - Liquid Glass AI Assistant</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --glass-bg: rgba(20, 20, 30, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-glow: rgba(138, 43, 226, 0.3);
      --text-primary: #ececec;
      --text-secondary: #b4b4b4;
      --border-color: rgba(255, 255, 255, 0.1);
      --accent-color: #667eea;
      --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --danger-color: #ef4444;
      --success-color: #10b981;
      --blob-1: #667eea;
      --blob-2: #f093fb;
      --blob-3: #4facfe;
    }

    html.light {
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.1);
      --glass-glow: rgba(102, 126, 234, 0.3);
      --text-primary: #0d0d0d;
      --text-secondary: #4d4d4d;
      --border-color: rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Blobs */
    #background-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    html.light #background-blobs {
      background: linear-gradient(135deg, #e0e7ff 0%, #ddd6fe 100%);
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: blobMove 20s infinite ease-in-out;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: var(--blob-1);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: var(--blob-2);
      bottom: -100px;
      right: -100px;
      animation-delay: 5s;
    }

    .blob-3 {
      width: 450px;
      height: 450px;
      background: var(--blob-3);
      top: 50%;
      left: 50%;
      animation-delay: 10s;
    }

    @keyframes blobMove {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(100px, -50px) scale(1.1);
      }
      66% {
        transform: translate(-50px, 100px) scale(0.9);
      }
    }

    #app {
      display: flex;
      height: 100%;
      position: relative;
    }

    /* Sidebar */
    #sidebar {
      width: 280px;
      backdrop-filter: blur(20px) saturate(180%);
      background: var(--glass-bg);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
      position: relative;
    }

    #sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .new-chat-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--accent-gradient);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .new-chat-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .search-box {
      padding: 0 16px 12px;
      position: relative;
      z-index: 1;
    }

    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      pointer-events: none;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      position: relative;
      z-index: 1;
    }

    .chat-list::-webkit-scrollbar {
      width: 6px;
    }

    .chat-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-list::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 3px;
    }

    .chat-item {
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 14px;
      color: var(--text-secondary);
      transition: all 0.2s;
      position: relative;
      backdrop-filter: blur(10px);
    }

    .chat-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .chat-item.active {
      background: rgba(102, 126, 234, 0.15);
      color: var(--text-primary);
      border: 1px solid rgba(102, 126, 234, 0.3);
    }

    .chat-item.pinned::before {
      content: '📌';
      position: absolute;
      left: 4px;
      top: 4px;
      font-size: 10px;
    }

    .chat-item-content {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-item-badge {
      background: var(--accent-color);
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    .chat-item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .chat-item:hover .chat-item-actions {
      opacity: 1;
    }

    .chat-item-actions button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .chat-item-actions button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .chat-item-actions button.danger:hover {
      color: var(--danger-color);
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .footer-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .footer-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-color);
    }

    /* Main Area */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      backdrop-filter: blur(20px) saturate(180%);
      background: var(--glass-bg);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
      position: relative;
    }

    #header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .model-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    .model-selector:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-color);
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .icon-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }

    .icon-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    #chat-container::-webkit-scrollbar {
      width: 8px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 4px;
    }

    #messages {
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .message {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      animation: messageSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes messageSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      transition: all 0.3s;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .message.assistant .avatar {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(240, 147, 251, 0.3);
    }

    .message-body {
      flex: 1;
      overflow: hidden;
    }

    .message-header {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--text-primary);
    }

    .content {
      line-height: 1.7;
      word-wrap: break-word;
      color: var(--text-primary);
    }

    .msg-attachments {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .msg-attachments img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .msg-attachments img:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message:hover .actions {
      opacity: 1;
    }

    .actions button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    .actions button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border-color: var(--accent-color);
      transform: translateY(-1px);
    }

    .error-msg {
      color: var(--danger-color);
      background: rgba(239, 68, 68, 0.1);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--danger-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Markdown Styling */
    .markdown-content p {
      margin: 0 0 16px 0;
    }

    .markdown-content p:last-child {
      margin-bottom: 0;
    }

    .markdown-content ul, .markdown-content ol {
      padding-left: 24px;
      margin-bottom: 16px;
    }

    .markdown-content pre {
      background: rgba(13, 13, 13, 0.9);
      color: #fff;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 16px 0;
      position: relative;
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
    }

    html.light .markdown-content pre {
      background: rgba(244, 244, 244, 0.9);
      color: #0d0d0d;
    }

    .markdown-content code {
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      font-size: 13px;
    }

    .markdown-content p code {
      background: rgba(102, 126, 234, 0.15);
      padding: 3px 7px;
      border-radius: 6px;
      font-size: 0.9em;
      border: 1px solid rgba(102, 126, 234, 0.2);
    }

    .markdown-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 16px 0;
      backdrop-filter: blur(10px);
      border-radius: 10px;
      overflow: hidden;
    }

    .markdown-content th, .markdown-content td {
      border: 1px solid var(--glass-border);
      padding: 10px;
      text-align: left;
    }

    .markdown-content th {
      background: rgba(102, 126, 234, 0.1);
      font-weight: 600;
    }

    .markdown-content blockquote {
      border-left: 4px solid var(--accent-color);
      margin: 0 0 16px 0;
      padding: 12px 16px;
      color: var(--text-secondary);
      background: rgba(102, 126, 234, 0.05);
      border-radius: 0 10px 10px 0;
      backdrop-filter: blur(10px);
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent-gradient);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 12px 0;
    }

    .typing-indicator span {
      width: 10px;
      height: 10px;
      background: var(--accent-color);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out both;
      box-shadow: 0 0 10px var(--accent-color);
    }

    .typing-indicator span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typingBounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Input Area */
    #input-area {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 768px;
      padding: 0 20px;
      box-sizing: border-box;
    }

    .attachment-previews {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .att-preview {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      background: var(--glass-bg);
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .att-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .att-preview .remove-att {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--danger-color);
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      font-size: 12px;
      transition: all 0.2s;
    }

    .att-preview .remove-att:hover {
      transform: scale(1.1);
    }

    .input-wrapper {
      backdrop-filter: blur(20px) saturate(180%);
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 24px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: all 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-color);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3), 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    #message-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 16px;
      resize: none;
      max-height: 200px;
      overflow-y: auto;
      width: 100%;
      line-height: 1.5;
      padding: 4px 0;
    }

    #message-input::placeholder {
      color: var(--text-secondary);
    }

    .input-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .send-btn {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      transition: all 0.3s;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 20px;
      margin-top: 10vh;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .empty-state h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .empty-state p {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 16px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      max-width: 900px;
      width: 100%;
    }

    .suggestion-card {
      backdrop-filter: blur(20px) saturate(180%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: left;
      font-size: 14px;
    }

    .suggestion-card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--accent-color);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.3);
    }

    .suggestion-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }

    .suggestion-text {
      flex: 1;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal {
      backdrop-filter: blur(30px) saturate(180%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      animation: modalSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 24px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-group {
      margin-bottom: 20px;
    }

    .modal-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
    }

    .modal-group input, .modal-group select {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      box-sizing: border-box;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .modal-group input:focus, .modal-group select:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-color);
    }

    .btn-danger {
      background: var(--danger-color);
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    /* Theme Customizer */
    .color-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-option {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.active {
      border-color: white;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      backdrop-filter: blur(20px) saturate(180%);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 14px 20px;
      border-radius: 12px;
      z-index: 200;
      animation: toastSlideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .toast.success {
      border-color: var(--success-color);
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
    }

    .toast.error {
      border-color: var(--danger-color);
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
    }

    @keyframes toastSlideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Zen Mode */
    body.zen-mode #sidebar,
    body.zen-mode #header {
      transform: translateX(-100%);
      opacity: 0;
      pointer-events: none;
    }

    body.zen-mode #input-area {
      max-width: 900px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar {
        position: absolute;
        height: 100%;
        transform: translateX(-100%);
        box-shadow: 5px 0 20px rgba(0, 0, 0, 0.3);
      }

      #sidebar.open {
        transform: translateX(0);
      }

      #menu-toggle {
        display: flex;
      }

      #messages {
        padding: 10px;
        padding-bottom: 120px;
      }

      #input-area {
        padding: 0 10px;
        bottom: 10px;
      }

      .empty-state h1 {
        font-size: 1.8rem;
      }

      .suggestions {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 769px) {
      #menu-toggle {
        display: none;
      }
    }

    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg, 
        rgba(255,255,255,0.05) 25%, 
        rgba(255,255,255,0.1) 50%, 
        rgba(255,255,255,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    /* Shortcuts Info */
    .shortcuts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .shortcut-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 13px;
    }

    .kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      border: 1px solid var(--glass-border);
    }
  </style>
</head>
<body>
  <div id="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" onclick="createNewChat()">
          <i data-lucide="plus"></i> Nuova Chat
        </button>
      </div>
      
      <div class="search-box">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" class="search-input" placeholder="Cerca chat..." oninput="searchChats(this.value)">
      </div>
      
      <div class="chat-list" id="chat-list"></div>
      
      <div class="sidebar-footer">
        <button class="footer-btn" onclick="exportChats()">
          <i data-lucide="download"></i> Export
        </button>
        <button class="footer-btn" onclick="importChats()">
          <i data-lucide="upload"></i> Import
        </button>
        <button class="footer-btn" onclick="openSettings()">
          <i data-lucide="sliders-horizontal"></i>
        </button>
      </div>
    </aside>

    <main id="main">
      <header id="header">
        <div class="header-left">
          <button class="icon-btn" id="menu-toggle" onclick="toggleSidebar()">
            <i data-lucide="menu"></i>
          </button>
          <select class="model-selector" id="model-selector" onchange="changeModel(this.value)">
            <option value="llama-3.1-8b-instant">
              <i data-lucide="cpu"></i> GPT-3.5
            </option>
          </select>
        </div>
        <div class="header-right">
          <button class="icon-btn" onclick="toggleZenMode()" title="Zen Mode (Ctrl+Shift+Z)">
            <i data-lucide="focus"></i>
          </button>
          <button class="icon-btn" onclick="toggleStreaming()" id="streaming-toggle" title="Toggle Streaming">
            <i data-lucide="zap"></i>
          </button>
        </div>
      </header>

      <div id="chat-container">
        <div id="messages"></div>
      </div>

      <div id="input-area">
        <div class="attachment-previews" id="attachment-previews"></div>
        <div class="input-wrapper">
          <textarea id="message-input" rows="1" placeholder="Invia un messaggio..." onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
          <div class="input-controls">
            <div style="display: flex; gap: 8px;">
              <button class="icon-btn" onclick="triggerAttachment()" title="Allega file">
                <i data-lucide="image-plus"></i>
              </button>
              <input type="file" id="file-input" accept="image/*" multiple style="display: none" onchange="handleFileSelect(event)">
              <button class="icon-btn" onclick="undoLastMessage()" title="Annulla (Ctrl+Z)">
                <i data-lucide="undo"></i>
              </button>
            </div>
            <button class="icon-btn send-btn" id="send-btn" onclick="handleSend()" disabled>
              <i data-lucide="send-horizontal"></i>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="settings-modal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h2>Impostazioni</h2>
      <div class="modal-group">
        <label>Chiave API Groq</label>
        <input type="password" id="api-key-input" placeholder="gsk_...">
        <small style="color: var(--text-secondary); display: block; margin-top: 6px; font-size: 12px;">Salvata localmente nel tuo browser.</small>
      </div>
      <div class="modal-group">
        <label>Tema</label>
        <button class="btn btn-secondary" onclick="toggleTheme()" id="theme-btn">Cambia Tema</button>
      </div>
      <div class="modal-group">
        <label>Colore Accent</label>
        <div class="color-picker" id="color-picker">
          <div class="color-option" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-color="#667eea"></div>
          <div class="color-option" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" data-color="#f093fb"></div>
          <div class="color-option" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" data-color="#4facfe"></div>
          <div class="color-option" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);" data-color="#43e97b"></div>
          <div class="color-option" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);" data-color="#fa709a"></div>
        </div>
      </div>
      <div class="modal-group">
        <label>Scorciatoie Tastiera</label>
        <div class="shortcuts-grid">
          <div class="shortcut-item"><span class="kbd">Ctrl+N</span> Nuova Chat</div>
          <div class="shortcut-item"><span class="kbd">Ctrl+/</span> Cerca</div>
          <div class="shortcut-item"><span class="kbd">Ctrl+Shift+Z</span> Zen Mode</div>
          <div class="shortcut-item"><span class="kbd">Ctrl+Z</span> Annulla</div>
        </div>
      </div>
      <div class="modal-group">
        <label>Zona Pericolo</label>
        <button class="btn btn-danger" onclick="clearAllData()">Cancella Tutte le Chat</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeSettings()">Chiudi</button>
        <button class="btn btn-primary" onclick="saveSettings()">Salva</button>
      </div>
    </div>
  </div>

  <input type="file" id="import-input" accept=".json" style="display: none" onchange="handleImport(event)">

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      marked.use({ breaks: true, gfm: true });

      window.state = {
        apiKey: localStorage.getItem('groq_api_key') || '',
        theme: localStorage.getItem('theme') || 'dark',
        accentColor: localStorage.getItem('accent_color') || '#667eea',
        chats: JSON.parse(localStorage.getItem('chats') || '[]'),
        activeChatId: localStorage.getItem('active_chat_id') || null,
        selectedModelId: localStorage.getItem('selected_model_id') || 'llama-3.1-8b-instant',
        pendingAttachments: [],
        streamingEnabled: localStorage.getItem('streaming_enabled') !== 'false',
        searchQuery: '',
        isSending: false,
        lastDeletedMessage: null
      };

      window.MODELS = [
        {
          id: 'llama-3.1-8b-instant',
          displayName: 'GPT-3.5',
          systemPrompt: 'Sei GPT-3.5, un assistente AI rapido ed efficiente. Fornisci risposte concise, dirette e utili.',
          vision: false
        },
        {
          id: 'openai/gpt-oss-20b',
          displayName: 'GPT-4o mini',
          systemPrompt: 'Sei GPT-4o mini, un\'IA bilanciata e altamente capace. Fornisci risposte ben strutturate e accurate.',
          vision: false
        },
        {
          id: 'openai/gpt-oss-120b',
          displayName: 'GPT-4 Turbo',
          systemPrompt: 'Sei GPT-4 Turbo, un\'IA d\'élite per compiti complessi. Impegnati in un ragionamento profondo.',
          vision: false
        },
        {
          id: 'llama-3.2-11b-vision-preview',
          displayName: 'GPT-4 Vision',
          systemPrompt: 'Sei un\'IA avanzata con capacità visive. Analizza le immagini con precisione.',
          vision: true
        }
      ];

      if (state.theme === 'light') document.documentElement.classList.remove('dark');
      else document.documentElement.classList.add('dark');

      applyAccentColor(state.accentColor);

      if (state.chats.length === 0) createNewChat(true);
      
      renderModelSelector();
      render();
      updateStreamingToggle();
      
      document.getElementById('message-input').addEventListener('input', updateSendButton);
      
      document.addEventListener('keydown', handleGlobalShortcuts);
      
      lucide.createIcons();
    });

    function applyAccentColor(color) {
      document.documentElement.style.setProperty('--accent-color', color);
      document.documentElement.style.setProperty('--accent-gradient', `linear-gradient(135deg, ${color} 0%, ${adjustColor(color, -20)} 100%)`);
      
      document.querySelectorAll('.color-option').forEach(el => {
        el.classList.toggle('active', el.dataset.color === color);
      });
    }

    function adjustColor(color, amount) {
      const num = parseInt(color.replace('#', ''), 16);
      const r = Math.max(0, Math.min(255, (num >> 16) + amount));
      const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
      const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
      return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
    }

    function handleGlobalShortcuts(e) {
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'n') {
          e.preventDefault();
          createNewChat();
        } else if (e.key === '/') {
          e.preventDefault();
          document.querySelector('.search-input').focus();
        } else if (e.shiftKey && e.key === 'Z') {
          e.preventDefault();
          toggleZenMode();
        } else if (e.key === 'z' && !e.shiftKey) {
          e.preventDefault();
          undoLastMessage();
        }
      }
    }

    function getActiveChat() {
      return state.chats.find(c => c.id === state.activeChatId);
    }

    function saveState() {
      try {
        localStorage.setItem('chats', JSON.stringify(state.chats));
        localStorage.setItem('active_chat_id', state.activeChatId);
        localStorage.setItem('selected_model_id', state.selectedModelId);
      } catch (e) {
        if (e.name === 'QuotaExceededError') {
          showToast('Spazio di archiviazione pieno! Esporta e cancella vecchie chat.', 'error');
        }
      }
    }

    function createNewChat(isInit = false) {
      const id = Date.now().toString();
      state.chats.unshift({ id, title: 'Nuova Chat', messages: [], pinned: false });
      state.activeChatId = id;
      saveState();
      render();
      if (!isInit) document.getElementById('message-input').focus();
    }

    function deleteChat(e, id) {
      e.stopPropagation();
      if (!confirm('Eliminare questa chat?')) return;
      state.chats = state.chats.filter(c => c.id !== id);
      if (state.activeChatId === id) {
        state.activeChatId = state.chats[0]?.id || null;
        if (!state.activeChatId) createNewChat(true);
      }
      saveState();
      render();
    }

    function switchChat(id) {
      state.activeChatId = id;
      saveState();
      render();
    }

    function togglePinChat(e, id) {
      e.stopPropagation();
      const chat = state.chats.find(c => c.id === id);
      if (chat) {
        chat.pinned = !chat.pinned;
        state.chats.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
        saveState();
        render();
      }
    }

    function renameChat(e, id) {
      e.stopPropagation();
      const chat = state.chats.find(c => c.id === id);
      if (!chat) return;
      
      const newTitle = prompt('Nuovo titolo:', chat.title);
      if (newTitle && newTitle.trim()) {
        chat.title = newTitle.trim();
        saveState();
        render();
      }
    }

    function searchChats(query) {
      state.searchQuery = query.toLowerCase();
      renderSidebar();
    }

    function changeModel(modelId) {
      state.selectedModelId = modelId;
      saveState();
      
      const model = MODELS.find(m => m.id === modelId);
      if (state.pendingAttachments.length > 0 && !model.vision) {
        showToast('Questo modello non supporta le immagini. Usa GPT-4 Vision.', 'error');
      }
    }

    function renderModelSelector() {
      const select = document.getElementById('model-selector');
      select.innerHTML = MODELS.map(m => 
        `<option value="${m.id}" ${m.id === state.selectedModelId ? 'selected' : ''}>${m.displayName}</option>`
      ).join('');
    }

    function render() {
      renderSidebar();
      renderMessages();
      lucide.createIcons();
    }

    function renderSidebar() {
      const list = document.getElementById('chat-list');
      let filteredChats = state.chats;
      
      if (state.searchQuery) {
        filteredChats = state.chats.filter(c => 
          c.title.toLowerCase().includes(state.searchQuery)
        );
      }
      
      list.innerHTML = filteredChats.map(c => `
        <div class="chat-item ${c.id === state.activeChatId ? 'active' : ''} ${c.pinned ? 'pinned' : ''}" onclick="switchChat('${c.id}')">
          <div class="chat-item-content">${c.title}</div>
          ${c.messages.length > 0 ? `<span class="chat-item-badge">${c.messages.length}</span>` : ''}
          <div class="chat-item-actions">
            <button onclick="togglePinChat(event, '${c.id}')" title="${c.pinned ? 'Unpin' : 'Pin'}">
              <i data-lucide="pin" size="14"></i>
            </button>
            <button onclick="renameChat(event, '${c.id}')" title="Rinomina">
              <i data-lucide="edit" size="14"></i>
            </button>
            <button class="danger" onclick="deleteChat(event, '${c.id}')" title="Elimina">
              <i data-lucide="trash-2" size="14"></i>
            </button>
          </div>
        </div>
      `).join('');
      
      lucide.createIcons();
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      const chat = getActiveChat();
      
      if (!chat || chat.messages.length === 0) {
        container.innerHTML = getEmptyStateHTML();
        lucide.createIcons();
        return;
      }

      container.innerHTML = chat.messages.map((msg, idx) => {
        const isUser = msg.role === 'user';
        const model = MODELS.find(m => m.id === msg.modelId) || { displayName: 'AI' };
        
        let contentHtml = '';
        if (msg.isStreaming && msg.content === '') {
          contentHtml = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        } else if (msg.hasError) {
          contentHtml = `<div class="error-msg"><i data-lucide="alert-circle"></i> ${msg.content}</div>`;
        } else {
          contentHtml = `<div class="markdown-content">${DOMPurify.sanitize(marked.parse(msg.content))}</div>`;
        }

        let attachmentsHtml = '';
        if (msg.attachments && msg.attachments.length > 0) {
          attachmentsHtml = `<div class="msg-attachments">
            ${msg.attachments.map(att => `<img src="${att.url}" alt="attachment">`).join('')}
          </div>`;
        }

        let actionsHtml = '';
        if (!isUser && !msg.isStreaming && !msg.hasError) {
          actionsHtml = `
            <div class="actions">
              <button onclick="copyMessage(${idx})"><i data-lucide="clipboard"></i> Copia</button>
              <button onclick="regenerate(${idx})"><i data-lucide="wand-sparkles"></i> Rigenera</button>
              <button onclick="showRetryMenu(event, ${idx})"><i data-lucide="shuffle"></i> Altro modello</button>
            </div>
          `;
        } else if (msg.hasError) {
          actionsHtml = `
            <div class="actions">
              <button onclick="regenerate(${idx})"><i data-lucide="rotate-ccw"></i> Riprova</button>
            </div>
          `;
        }

        return `
          <div class="message ${msg.role}">
            <div class="avatar">
              ${isUser ? '<i data-lucide="user"></i>' : '<i data-lucide="brain-circuit"></i>'}
            </div>
            <div class="message-body">
              <div class="message-header">${isUser ? 'Tu' : model.displayName}</div>
              <div class="content">
                ${contentHtml}
                ${attachmentsHtml}
              </div>
              ${actionsHtml}
            </div>
          </div>
        `;
      }).join('');

      lucide.createIcons();
      document.querySelectorAll('.markdown-content pre code').forEach((block) => {
        hljs.highlightElement(block);
      });
      addCopyButtons();
    }

    function getEmptyStateHTML() {
      return `
        <div class="empty-state">
          <div class="empty-state-icon">
            <i data-lucide="brain-circuit" style="width: 80px; height: 80px; color: var(--accent-color);"></i>
          </div>
          <h1>Come posso aiutarti oggi?</h1>
          <p>Sono il tuo assistente AI personale. Chiedimi qualsiasi cosa!</p>
          <div class="suggestions">
            <div class="suggestion-card" onclick="fillInput('Spiegami la teoria della relatività in termini semplici')">
              <div class="suggestion-icon"><i data-lucide="lightbulb"></i></div>
              <div class="suggestion-text">Spiegami la teoria della relatività</div>
            </div>
            <div class="suggestion-card" onclick="fillInput('Scrivi una email formale per chiedere un giorno di ferie')">
              <div class="suggestion-icon"><i data-lucide="mail"></i></div>
              <div class="suggestion-text">Scrivi una email formale per ferie</div>
            </div>
            <div class="suggestion-card" onclick="fillInput('Genera uno script Python per web scraping con BeautifulSoup')">
              <div class="suggestion-icon"><i data-lucide="code"></i></div>
              <div class="suggestion-text">Script Python per web scraping</div>
            </div>
            <div class="suggestion-card" onclick="fillInput('Dammi un\\'idea per una ricetta vegetariana veloce')">
              <div class="suggestion-icon"><i data-lucide="utensils"></i></div>
              <div class="suggestion-text">Idea per ricetta vegetariana veloce</div>
            </div>
          </div>
        </div>
      `;
    }

    function fillInput(text) {
      const input = document.getElementById('message-input');
      input.value = text;
      autoResize(input);
      updateSendButton();
      input.focus();
    }

    function addCopyButtons() {
      document.querySelectorAll('.markdown-content pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copia';
        btn.onclick = () => {
          navigator.clipboard.writeText(pre.querySelector('code').innerText);
          btn.textContent = 'Copiato!';
          setTimeout(() => btn.textContent = 'Copia', 2000);
        };
        pre.appendChild(btn);
      });
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = (el.scrollHeight) + 'px';
      updateSendButton();
    }

    function updateSendButton() {
      const input = document.getElementById('message-input');
      const btn = document.getElementById('send-btn');
      btn.disabled = (!input.value.trim() && state.pendingAttachments.length === 0) || state.isSending;
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    }

    function triggerAttachment() {
      document.getElementById('file-input').click();
    }

    function handleFileSelect(e) {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        if (file.size > 5 * 1024 * 1024) {
          showToast('File troppo grande. Max 5MB.', 'error');
          return;
        }
        const reader = new FileReader();
        reader.onload = (event) => {
          state.pendingAttachments.push({
            url: event.target.result,
            type: file.type
          });
          renderAttachmentPreviews();
          updateSendButton();
        };
        reader.readAsDataURL(file);
      });
      e.target.value = '';
    }

    function renderAttachmentPreviews() {
      const container = document.getElementById('attachment-previews');
      container.innerHTML = state.pendingAttachments.map((att, idx) => `
        <div class="att-preview">
          <img src="${att.url}" alt="attachment">
          <button class="remove-att" onclick="removeAttachment(${idx})">
            <i data-lucide="x" size="12"></i>
          </button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function removeAttachment(idx) {
      state.pendingAttachments.splice(idx, 1);
      renderAttachmentPreviews();
      updateSendButton();
    }

    async function handleSend() {
      if (state.isSending) return;
      
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text && state.pendingAttachments.length === 0) return;
      
      if (!state.apiKey) {
        showToast('Inserisci la chiave API Groq nelle impostazioni.', 'error');
        openSettings();
        return;
      }

      state.isSending = true;
      updateSendButton();

      const chat = getActiveChat();
      const userMessage = {
        role: 'user',
        content: text,
        attachments: [...state.pendingAttachments],
        timestamp: Date.now()
      };
      chat.messages.push(userMessage);
      state.lastDeletedMessage = { chatId: chat.id, message: userMessage, index: chat.messages.length - 1 };
      
      if (chat.messages.length === 1 && chat.title === 'Nuova Chat') {
        chat.title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
        renderSidebar();
      }

      input.value = '';
      input.style.height = 'auto';
      state.pendingAttachments = [];
      renderAttachmentPreviews();
      updateSendButton();
      saveState();
      renderMessages();
      scrollToBottom();

      const apiMessages = formatMessagesForAPI(chat.messages);
      
      const assistantMessage = {
        role: 'assistant',
        content: '',
        modelId: state.selectedModelId,
        timestamp: Date.now(),
        isStreaming: state.streamingEnabled
      };
      chat.messages.push(assistantMessage);
      renderMessages();
      scrollToBottom(true);

      try {
        const fullText = state.streamingEnabled 
          ? await streamGroq(apiMessages, state.selectedModelId)
          : await completeGroq(apiMessages, state.selectedModelId);
        
        assistantMessage.content = fullText;
        assistantMessage.isStreaming = false;
        saveState();
        renderMessages(); 
        scrollToBottom(true);
      } catch (error) {
        assistantMessage.content = `Errore: ${error.message}`;
        assistantMessage.isStreaming = false;
        assistantMessage.hasError = true;
        saveState();
        renderMessages();
        scrollToBottom(true);
      } finally {
        state.isSending = false;
        updateSendButton();
      }
    }

    function formatMessagesForAPI(messages) {
      const model = MODELS.find(m => m.id === state.selectedModelId);
      let formatted = [
        { role: 'system', content: model.systemPrompt }
      ];
      
      messages.forEach(msg => {
        if (msg.role === 'user') {
          if (msg.attachments && msg.attachments.length > 0 && model.vision) {
            formatted.push({
              role: 'user',
              content: [
                { type: 'text', text: msg.content || 'Descrivi questa immagine.' },
                ...msg.attachments.map(att => ({
                  type: 'image_url',
                  image_url: { url: att.url }
                }))
              ]
            });
          } else {
            formatted.push({ role: 'user', content: msg.content });
          }
        } else if (msg.role === 'assistant' && !msg.hasError && !msg.isStreaming) {
          formatted.push({ role: 'assistant', content: msg.content });
        }
      });
      
      return formatted;
    }

    async function completeGroq(messages, modelId) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`
        },
        body: JSON.stringify({
          model: modelId,
          messages: messages,
          stream: false,
          temperature: 0.7,
          max_tokens: 4096
        })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `Errore HTTP ${response.status}`);
      }

      const data = await response.json();
      return data.choices[0]?.message?.content || '';
    }

    async function streamGroq(messages, modelId) {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.apiKey}`
        },
        body: JSON.stringify({
          model: modelId,
          messages: messages,
          stream: true,
          temperature: 0.7,
          max_tokens: 4096
        })
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `Errore HTTP ${response.status}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';
      
      const assistantEl = document.querySelector('.message.assistant:last-child .content');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        
        for (const line of lines) {
          if (line.trim().startsWith('data: ')) {
            const data = line.trim().substring(6);
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              const delta = parsed.choices[0]?.delta?.content || '';
              if (delta) {
                fullText += delta;
                if (assistantEl) {
                  assistantEl.innerHTML = `<div class="markdown-content">${DOMPurify.sanitize(marked.parse(fullText))}</div>`;
                  assistantEl.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                  });
                  addCopyButtons();
                }
                scrollToBottom();
              }
            } catch (e) {}
          }
        }
      }
      return fullText;
    }

    function scrollToBottom(force = false) {
      const container = document.getElementById('chat-container');
      const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 150;
      if (force || isNearBottom) {
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
      }
    }

    function copyMessage(idx) {
      const msg = getActiveChat().messages[idx];
      navigator.clipboard.writeText(msg.content);
      showToast('Copiato negli appunti!', 'success');
    }

    async function regenerate(idx) {
      const chat = getActiveChat();
      const oldMsg = chat.messages[idx];
      if (oldMsg.role !== 'assistant') return;
      
      let userMsgIndex = -1;
      for (let i = idx - 1; i >= 0; i--) {
        if (chat.messages[i].role === 'user') {
          userMsgIndex = i;
          break;
        }
      }
      if (userMsgIndex === -1) return;

      chat.messages.splice(idx, 1);
      
      const newAssistantMessage = {
        role: 'assistant',
        content: '',
        modelId: oldMsg.modelId,
        timestamp: Date.now(),
        isStreaming: state.streamingEnabled
      };
      chat.messages.splice(idx, 0, newAssistantMessage);
      saveState();
      renderMessages();
      scrollToBottom(true);

      const apiMessages = formatMessagesForAPI(chat.messages.slice(0, idx + 1));
      
      try {
        const fullText = state.streamingEnabled
          ? await streamGroq(apiMessages, oldMsg.modelId)
          : await completeGroq(apiMessages, oldMsg.modelId);
        
        newAssistantMessage.content = fullText;
        newAssistantMessage.isStreaming = false;
        saveState();
        renderMessages();
      } catch (error) {
        newAssistantMessage.content = `Errore: ${error.message}`;
        newAssistantMessage.isStreaming = false;
        newAssistantMessage.hasError = true;
        saveState();
        renderMessages();
      }
    }

    function showRetryMenu(event, idx) {
      event.stopPropagation();
      const existing = document.querySelector('.retry-menu');
      if (existing) existing.remove();

      const menu = document.createElement('div');
      menu.className = 'retry-menu';
      menu.style.cssText = `
        position: absolute;
        backdrop-filter: blur(20px) saturate(180%);
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 8px;
        z-index: 1000;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        min-width: 200px;
        top: ${event.clientY}px;
        left: ${event.clientX}px;
      `;

      MODELS.forEach(m => {
        if (m.id !== state.selectedModelId) {
          const btn = document.createElement('button');
          btn.textContent = m.displayName;
          btn.className = 'retry-menu-item';
          btn.style.cssText = `
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
          `;
          btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.05)';
          btn.onmouseout = () => btn.style.background = 'transparent';
          btn.onclick = (e) => {
            e.stopPropagation();
            retryWithModel(idx, m.id);
            menu.remove();
          };
          menu.appendChild(btn);
        }
      });

      document.body.appendChild(menu);

      const closeMenu = () => {
        menu.remove();
        document.removeEventListener('click', closeMenu);
      };
      setTimeout(() => document.addEventListener('click', closeMenu), 0);
    }

    async function retryWithModel(idx, newModelId) {
      const chat = getActiveChat();
      const oldMsg = chat.messages[idx];
      if (oldMsg.role !== 'assistant') return;
      
      chat.messages.splice(idx, 1);
      
      const newAssistantMessage = {
        role: 'assistant',
        content: '',
        modelId: newModelId,
        timestamp: Date.now(),
        isStreaming: state.streamingEnabled
      };
      chat.messages.splice(idx, 0, newAssistantMessage);
      
      const prevSelected = state.selectedModelId;
      state.selectedModelId = newModelId;
      saveState();
      renderMessages();
      scrollToBottom(true);

      const apiMessages = formatMessagesForAPI(chat.messages.slice(0, idx + 1));
      
      try {
        const fullText = state.streamingEnabled
          ? await streamGroq(apiMessages, newModelId)
          : await completeGroq(apiMessages, newModelId);
        
        newAssistantMessage.content = fullText;
        newAssistantMessage.isStreaming = false;
        saveState();
        renderMessages();
      } catch (error) {
        newAssistantMessage.content = `Errore: ${error.message}`;
        newAssistantMessage.isStreaming = false;
        newAssistantMessage.hasError = true;
        saveState();
        renderMessages();
      } finally {
        state.selectedModelId = prevSelected;
        document.getElementById('model-selector').value = prevSelected;
      }
    }

    function undoLastMessage() {
      if (!state.lastDeletedMessage) {
        showToast('Niente da annullare.', 'error');
        return;
      }
      
      const chat = state.chats.find(c => c.id === state.lastDeletedMessage.chatId);
      if (chat && chat.messages.length > 0) {
        chat.messages.pop();
        if (chat.messages.length > 0) {
          chat.messages.pop();
        }
        saveState();
        renderMessages();
        state.lastDeletedMessage = null;
        showToast('Ultimo messaggio annullato.', 'success');
      }
    }

    function exportChats() {
      const dataStr = JSON.stringify(state.chats, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `mygpt-chats-${Date.now()}.json`;
      link.click();
      URL.revokeObjectURL(url);
      showToast('Chat esportate con successo!', 'success');
    }

    function importChats() {
      document.getElementById('import-input').click();
    }

    function handleImport(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const imported = JSON.parse(event.target.result);
          if (!Array.isArray(imported)) throw new Error('Formato non valido');
          
          if (confirm('Sostituire le chat esistenti o unirle?')) {
            state.chats = imported;
          } else {
            state.chats = [...imported, ...state.chats];
          }
          
          saveState();
          render();
          showToast('Chat importate con successo!', 'success');
        } catch (error) {
          showToast('Errore nell\'importazione: ' + error.message, 'error');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    }

    function openSettings() {
      document.getElementById('settings-modal').style.display = 'flex';
      document.getElementById('api-key-input').value = state.apiKey;
    }

    function closeSettings() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function saveSettings() {
      state.apiKey = document.getElementById('api-key-input').value.trim();
      localStorage.setItem('groq_api_key', state.apiKey);
      closeSettings();
      showToast('Impostazioni salvate!', 'success');
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', state.theme);
      if (state.theme === 'light') document.documentElement.classList.remove('dark');
      else document.documentElement.classList.add('dark');
    }

    function toggleZenMode() {
      document.body.classList.toggle('zen-mode');
      showToast(document.body.classList.contains('zen-mode') ? 'Zen Mode attivato' : 'Zen Mode disattivato', 'success');
    }

    function toggleStreaming() {
      state.streamingEnabled = !state.streamingEnabled;
      localStorage.setItem('streaming_enabled', state.streamingEnabled);
      updateStreamingToggle();
      showToast(`Streaming ${state.streamingEnabled ? 'attivato' : 'disattivato'}`, 'success');
    }

    function updateStreamingToggle() {
      const btn = document.getElementById('streaming-toggle');
      btn.style.opacity = state.streamingEnabled ? '1' : '0.5';
    }

    function clearAllData() {
      if (!confirm('Sei sicuro di voler cancellare tutto?')) return;
      localStorage.clear();
      location.reload();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.style.animation = 'toastSlideIn 0.3s reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    document.getElementById('color-picker')?.addEventListener('click', (e) => {
      const option = e.target.closest('.color-option');
      if (option) {
        const color = option.dataset.color;
        state.accentColor = color;
        localStorage.setItem('accent_color', color);
        applyAccentColor(color);
        showToast('Colore accent aggiornato!', 'success');
      }
    });
  </script>
</body>
